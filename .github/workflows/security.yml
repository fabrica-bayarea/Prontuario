name: Security Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: SAST + SonarQube
    runs-on: ubuntu-latest

    steps:
      # ------------------------
      # CHECKOUT
      # ------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------
      # SETUP NODE
      # ------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ------------------------
      # INSTALAR DEPENDÊNCIAS
      # ------------------------
      - name: Instalar dependências (backEnd)
        working-directory: ./backEnd
        run: npm install

      - name: Instalar dependências (frontEnd)
        working-directory: ./frontEnd
        run: npm install

      # ------------------------
      # TESTES (BACKEND)
      # ------------------------
      # ⚠️ Temporário
      - name: Rodar testes (backEnd)
        working-directory: ./backEnd
        run: npm test || true

      # ------------------------
      # SEMGREP (SAST)
      # ------------------------
      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep
        id: semgrep
        continue-on-error: true
        run: semgrep scan --config=p/owasp-top-ten --error

      # ------------------------
      # SONARQUBE
      # ------------------------
      - name: SonarQube Scan
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=fabrica-bayarea_Prontuario
            -Dsonar.organization=fabrica-bayarea
            -Dsonar.sources=backEnd,frontEnd
            -Dsonar.exclusions=**/node_modules/**,**/*.test.ts

      # ------------------------
      # SECURITY GATE (FINAL)
      # ------------------------
      - name: Security Gate
        run: |
          echo "Semgrep result: ${{ steps.semgrep.outcome }}"
          echo "Sonar result: ${{ steps.sonar.outcome }}"

          if [ "${{ steps.semgrep.outcome }}" != "success" ] || [ "${{ steps.sonar.outcome }}" != "success" ]; then
            echo "❌ Falha de segurança detectada"
            exit 1
          fi

          echo "✅ Pipeline seguro"
