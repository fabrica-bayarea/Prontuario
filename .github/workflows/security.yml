name: Security Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions: read-all

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================
  # CODEQL (SAST AVANÇADO)
  # =========================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 30

    strategy:
      matrix:
        language: [ 'javascript' ]

    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Rodar CodeQL
        uses: github/codeql-action/analyze@v3


  # =========================================
  # SAST + SONAR + SEMGREP
  # =========================================
  security:
    name: SAST + SonarQube
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 30

    needs: codeql
    if: always()

    steps:

      # ------------------------
      # CHECKOUT
      # ------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------
      # SETUP NODE
      # ------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node_modules (backEnd)
        uses: actions/cache@v4
        with:
          path: ./backEnd/node_modules
          key: ${{ runner.os }}-back-${{ hashFiles('backEnd/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-back-

      - name: Cache node_modules (frontEnd)
        uses: actions/cache@v4
        with:
          path: ./frontEnd/node_modules
          key: ${{ runner.os }}-front-${{ hashFiles('frontEnd/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-front-

      # ------------------------
      # INSTALAR DEPENDÊNCIAS
      # ------------------------
      - name: Instalar dependências (backEnd)
        working-directory: ./backEnd
        run: npm install

      - name: Instalar dependências (frontEnd)
        working-directory: ./frontEnd
        run: npm install

      # ------------------------
      # TESTES
      # ------------------------
      - name: Rodar testes (backEnd)
        working-directory: ./backEnd
        run: npm test || true

      # ------------------------
      # SEMGREP (SAST)
      # ------------------------
      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep
        id: semgrep
        continue-on-error: true
        run: semgrep scan --config=p/owasp-top-ten --sarif-output=semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # ------------------------
      # SONARQUBE
      # ------------------------
      - name: SonarQube Scan
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=fabrica-bayarea_Prontuario
            -Dsonar.organization=fabrica-bayarea
            -Dsonar.sources=backEnd,frontEnd
            -Dsonar.exclusions=**/node_modules/**,**/*.test.ts

      # ------------------------
      # SECURITY GATE (FINAL)
      # ------------------------
      - name: Security Gate
        run: |
          echo "Semgrep result: ${{ steps.semgrep.outcome }}"
          echo "Sonar result: ${{ steps.sonar.outcome }}"

          if [ "${{ steps.semgrep.outcome }}" != "success" ] || [ "${{ steps.sonar.outcome }}" != "success" ]; then
            echo "❌ Falha de segurança detectada"
            exit 1
          fi

          echo "✅ Pipeline seguro"